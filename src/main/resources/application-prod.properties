# Configuracion de la Base de Datos para PRODUCCION
# TODAS las credenciales se leen de variables de entorno (configuradas en Render)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion de JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT - leidas desde variables de entorno en Render
jwt.secret=${JWT_SECRET}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}

# Puerto configurable (Render asigna el puerto via $PORT)
server.port=${PORT:8080}

